<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Device — Attendify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card" style="margin: 40px auto;">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <span class="brand-name">Register <span>Device</span></span>
  </div>

  <p class="page-title">Device Registration</p>
  <p class="page-sub">Link your Bluetooth device to your student account. This is required before marking attendance.</p>

  <div class="field">
    <label class="field-label">Roll Number</label>
    <input id="roll" placeholder="e.g. STU2024001">
  </div>
  <div class="field">
    <label class="field-label">Password</label>
    <input id="password" type="password" placeholder="Your password">
  </div>

  <button type="button" id="btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 017 7v1h1a2 2 0 010 4h-1v1a7 7 0 01-14 0v-1H4a2 2 0 010-4h1V9a7 7 0 017-7z"/></svg>
    Connect via Bluetooth &amp; Register
  </button>

  <p style="text-align:center; font-size:0.78rem; color:var(--t4); margin-top:14px;">
    Requires Bluetooth and HTTPS / localhost
  </p>

</div>

<script>
document.getElementById("btn").addEventListener("click", registerDevice);

async function registerDevice(){
  try {
    const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });

    const rollValue = document.getElementById("roll").value.trim();
    if(!rollValue){ alert("Please enter your roll number."); return; }

    let deviceKey = localStorage.getItem("deviceKey");
    if(!deviceKey){
      deviceKey = "dev-" + Math.random().toString(36).substr(2,9);
      localStorage.setItem("deviceKey", deviceKey);
    }

    const res = await fetch('/save-device',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ roll: rollValue, deviceKey })
    });

    const data = await res.json();
    if(data.error){ alert("Error: " + data.error); }
    else { alert("Device registered successfully."); }

    document.getElementById("roll").value = "";
    document.getElementById("password").value = "";

  } catch(err) {
    if(err.name === "NotFoundError"){ alert("No device selected."); }
    else if(err.name === "SecurityError"){ alert("Please use HTTPS or localhost."); }
    else { alert("Bluetooth error: " + err.message); }
  }
}
</script>

</body>
</html>
