<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Attendify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card wide" style="margin: auto; margin-top: 40px;">

  <div class="dash-top">
    <div>
      <div class="brand" style="margin-bottom:6px;">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="#fff"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <span class="brand-name">Attend<span>ify</span></span>
      </div>
      <p class="dash-title">Admin Dashboard</p>
      <p class="dash-sub">Manage students, teachers, subjects and assignments</p>
    </div>
    <button class="btn-danger btn-sm" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>

  <div class="sec-head">
    <span class="sec-head-text">Add Data</span>
    <div class="sec-head-line"></div>
  </div>

  <div class="action-grid">
    <div class="action-tile c1" onclick="go('add_student')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="at-lbl">Add Student</span>
    </div>
    <div class="action-tile c2" onclick="go('add_teacher')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <span class="at-lbl">Add Teacher</span>
    </div>
    <div class="action-tile c3" onclick="go('add_subject')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </div>
      <span class="at-lbl">Add Subject</span>
    </div>
    <div class="action-tile c4" onclick="go('assign')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      </div>
      <span class="at-lbl">Assign</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="sec-head">
    <span class="sec-head-text">View Records</span>
    <div class="sec-head-line"></div>
  </div>

  <div class="action-grid">
    <div class="action-tile c1" onclick="go('admin_students')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      </div>
      <span class="at-lbl">Students</span>
    </div>
    <div class="action-tile c2" onclick="go('admin_teachers')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <span class="at-lbl">Teachers</span>
    </div>
    <div class="action-tile c3" onclick="go('admin_subjects')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </div>
      <span class="at-lbl">Subjects</span>
    </div>
    <div class="action-tile c4" onclick="go('admin_mapping')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="at-lbl">Mapping</span>
    </div>
  </div>

</div>

<script>
function go(page){ window.open("/" + page, "_blank"); }
function logout(){ window.location.href = "/"; }
</script>

</body>
</html>
