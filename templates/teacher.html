<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard — Attendify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card wide" style="margin: 40px auto; max-width: 560px;">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    </div>
    <span class="brand-name">Attend<span>ify</span></span>
  </div>

  <div class="dash-top">
    <div>
      <p class="dash-title">Teacher Dashboard</p>
      <p class="dash-sub">Manage attendance sessions for your subjects</p>
    </div>
    <button class="btn-danger btn-sm" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>

  <div class="action-grid" style="grid-template-columns: 1fr 1fr;">

    <div class="action-tile c3" onclick="go('/teacher_mark')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      <span class="at-lbl">Start Session</span>
    </div>

    <div class="action-tile c1" onclick="go('/teacher_view')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="at-lbl">View Attendance</span>
    </div>

  </div>

</div>

<script>
function go(p){ window.location.href = p; }
function logout(){ window.location.href = "/"; }
</script>

</body>
</html>
