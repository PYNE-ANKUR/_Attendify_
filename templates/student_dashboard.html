<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard — Attendify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card wide" style="margin: 40px auto; max-width: 560px;">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
    </div>
    <span class="brand-name">Attend<span>ify</span></span>
  </div>

  <div class="dash-top">
    <div>
      <p class="dash-title">Student Dashboard</p>
      <p class="dash-sub">Manage your attendance and device registration</p>
    </div>
    <button class="btn-danger btn-sm" onclick="go('/')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>

  <div class="action-grid" style="grid-template-columns: repeat(3, 1fr);">

    <div class="action-tile c1" onclick="go('/student_register')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span class="at-lbl">Register Device</span>
    </div>

    <div class="action-tile c3" onclick="go('/student_attendance')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      <span class="at-lbl">Mark Attendance</span>
    </div>

    <div class="action-tile c4" onclick="go('/student_view')">
      <div class="at-ic">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="at-lbl">View Attendance</span>
    </div>

  </div>

</div>

<script>
function go(p){ window.location.href = p; }
</script>

</body>
</html>
