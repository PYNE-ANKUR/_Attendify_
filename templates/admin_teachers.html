<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="center">
<div class="card wide" style="margin-top:40px;">

  <div class="view-top">
    <span class="view-title">Teachers</span>
    <span class="count-badge" id="count">Loading...</span>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Teacher ID</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>
</div>

<script>
fetch('/get-teachers')
.then(r=>r.json())
.then(d=>{
  document.getElementById('count').textContent = d.length + ' teachers';
  document.getElementById('tbody').innerHTML = d.map((x,i)=>`
    <tr>
      <td style="color:var(--t4); font-size:0.82rem;">${i+1}</td>
      <td><span class="pill pill-blue">${x.roll}</span></td>
    </tr>
  `).join('') || '<tr><td colspan="2" style="text-align:center;padding:32px;color:var(--t4);">No teachers found</td></tr>';
});
</script>
