<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="center">
<div class="card wide" style="margin-top:40px;">

  <div class="view-top">
    <span class="view-title">Students</span>
    <span class="count-badge" id="count">Loading...</span>
  </div>

  <table class="data-table" id="tbl">
    <thead>
      <tr>
        <th>Roll Number</th>
        <th>Password</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>
</div>

<script>
fetch('/get-students')
.then(r=>r.json())
.then(d=>{
  document.getElementById('count').textContent = d.length + ' students';
  document.getElementById('tbody').innerHTML = d.map(x=>`
    <tr>
      <td><span class="pill pill-blue">${x.roll}</span></td>
      <td style="color:var(--t3); font-family:'JetBrains Mono',monospace; font-size:0.82rem;">${x.password}</td>
    </tr>
  `).join('') || '<tr><td colspan="2" style="text-align:center;padding:32px;color:var(--t4);">No students found</td></tr>';
});
</script>
