<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Session — Attendify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card" style="margin: 40px auto;">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </div>
    <span class="brand-name">Start <span>Session</span></span>
  </div>

  <p class="page-title">Start Attendance Session</p>
  <p class="page-sub">Generate a session code for students to mark their attendance</p>

  <div class="field">
    <label class="field-label">Subject</label>
    <select id="subject"></select>
  </div>
  <div class="field">
    <label class="field-label">Duration (seconds)</label>
    <input id="duration" placeholder="e.g. 300" type="number" min="30">
  </div>

  <button onclick="start()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Start Session
  </button>

  <div id="code-wrap" style="display:none; margin-top:22px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--r); padding:20px; text-align:center;">
    <p style="font-size:0.78rem; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--t3); margin-bottom:8px;">Session Code</p>
    <p id="code" style="font-size:2.4rem; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--blue); letter-spacing:6px;"></p>
    <p style="font-size:0.78rem; color:var(--t4); margin-top:6px;">Share this code with your students</p>
  </div>

</div>

<script>
async function load(){
  const res = await fetch('/my-subjects');
  const d = await res.json();
  subject.innerHTML = d.length === 0
    ? '<option disabled>No subjects assigned</option>'
    : d.map(s=>`<option>${s.name}</option>`).join('');
}
load();

async function start(){
  const res = await fetch('/start-session',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ subject: subject.value, duration: duration.value })
  });
  const d = await res.json();
  document.getElementById('code').textContent = d.code;
  document.getElementById('code-wrap').style.display = 'block';
}
</script>

</body>
</html>
