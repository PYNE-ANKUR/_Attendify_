<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluetooth Test — Attendify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card" style="margin: 40px auto; max-width: 400px;">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11M12 2v4M12 18v4M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42"/></svg>
    </div>
    <span class="brand-name">Bluetooth <span>Test</span></span>
  </div>

  <p class="page-title">Bluetooth Diagnostic</p>
  <p class="page-sub">Verify that Bluetooth is available and working on this device</p>

  <button id="btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11"/></svg>
    Test Bluetooth
  </button>

  <p style="text-align:center; font-size:0.78rem; color:var(--t4); margin-top:14px;">
    Requires HTTPS or localhost
  </p>

</div>

<script>
document.getElementById("btn").addEventListener("click", async () => {
  try {
    const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
    alert("Bluetooth is working correctly.");
  } catch(e) {
    alert("Error: " + e.message);
  }
});
</script>

</body>
</html>
